<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accessible To-Do List</title>
  <style>
    /* Stiluri simple pentru aplicație */
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #f8f8f8;
    }
    #app {
      width: 100%;
      max-width: 400px;
      padding: 20px;
      border-radius: 5px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      background-color: #ffffff;
    }
    .todo-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px;
      margin-bottom: 5px;
      border: 1px solid #ddd;
      border-radius: 3px;
    }
    .todo-item button {
      background-color: #e74c3c;
      color: white;
      border: none;
      padding: 5px 10px;
      cursor: pointer;
      border-radius: 3px;
      font-size: 14px;
    }
    .todo-item button:focus {
      outline: 2px solid #333;
    }
  </style>
</head>
<body>
  <div id="app">
    <h1 id="todo-title">To-Do List</h1>
    <input id="todo-input" type="text" aria-label="New task" placeholder="Add a new task" />
    <button id="add-button" aria-label="Add task">Add</button>

    <ul id="todo-list" aria-labelledby="todo-title">
      <!-- Lista de activități va fi afișată aici -->
    </ul>
  </div>

  <script src="app.js"></script>
</body>
</html>
